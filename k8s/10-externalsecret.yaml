# Pulls every runtime secret for vocabuildary from Vault via the
# External Secrets Operator. No real values live in this repo.
#
# Expected layout in Vault (KV v2) at `kv/apps/vocabuildary/vocabuildary/env`:
#
#   DATABASE_URL:              "postgresql+psycopg://vocabuildary:<pw>@<host>:5432/vocabuildary"
#   DB_SCHEMA:                 "vocabuildary"
#   TELEGRAM_BOT_TOKEN:        "<from @BotFather>"
#   TELEGRAM_CHAT_ID:          "<your chat id>"
#   LLM_GATEWAY_URL:           "https://llmgateway.krishnarajthadesar.in"
#   LLM_GATEWAY_API_KEY:       "<gateway key>"
#   LLM_GATEWAY_DEFAULT_MODEL: "gemini-flash-latest"
#   LLM_GATEWAY_CHAT_PATH:     "/api/chat"
#   SEND_WORD_CRON:            "0 9 * * *"
#
# Postgres is NOT run by this chart — DATABASE_URL points at the Postgres
# you already have deployed in-cluster.
#
# `secretStoreRef.kind: ClusterSecretStore` assumes you already have a
# cluster-wide store pointing at Vault (the same one LLMGateway uses).
# Rename if yours is called something else.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vocabuildary-secrets
  namespace: vocabuildary
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vocabuildary-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: apps/vocabuildary/vocabuildary/env
