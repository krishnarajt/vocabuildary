apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vocabuildary
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/krishnarajt/vocabuildary
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: vocabuildary
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
