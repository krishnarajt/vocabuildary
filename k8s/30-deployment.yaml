# Long-running Vocabuildary service. APScheduler inside the pod handles
# the daily-word cadence; there is no k8s CronJob.
#
# replicas: 1 is deliberate — two pods would each fire the daily word and
# you'd get duplicate Telegram messages. `strategy: Recreate` makes
# rollouts terminate the old pod before starting the new one, so the
# scheduler never runs twice in parallel during a deploy either.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vocabuildary
  namespace: vocabuildary
  labels:
    app: vocabuildary
    component: service
spec:
  replicas: 1
  minReadySeconds: 60
  progressDeadlineSeconds: 180
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vocabuildary
  template:
    metadata:
      labels:
        app: vocabuildary
        component: service
    spec:
      # Bump if the pod ever needs longer than 30s to stop cleanly. The
      # service catches SIGTERM and shuts APScheduler down gracefully.
      terminationGracePeriodSeconds: 30
      containers:
        - name: vocabuildary
          # Replace with your registry path once you publish the image.
          image: ghcr.io/krishnarajt/vocabuildary:git-f4e604cd025538dd18c450f04d3e4af0e6ab3649
          imagePullPolicy: Always
          command: ["python", "main.py"]
          envFrom:
            # All secrets + connection strings come from the Vault-backed
            # Secret. Keys in the Secret map 1:1 to env var names read
            # by app/common/constants.py.
            - secretRef:
                name: vocabuildary-secrets
          env:
            # Non-secret, rarely-changed app knobs. Override here rather
            # than putting them in Vault.
            - name: LOG_LEVEL
              value: "INFO"
            - name: LOG_DIR
              value: "/app/logs"
            - name: TZ
              value: "Asia/Kolkata"
            - name: WORDS_CSV_PATH
              value: "/app/words.csv"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "20m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
